# =============================================================================
# LVGL UI LAYOUT — Modern card-based dashboard with tabview navigation
# =============================================================================
# Display: 1024x600 (7" MIPI DSI)
# Layout:  Header (40px) + Tabview (560px) with 3 tabs
#          Tab 1: Lights — toggles + brightness sliders + scenes
#          Tab 2: Climate — blind arc + fan arc + environment bars
#          Tab 3: Media — device switches + Sonos controls
# =============================================================================

lvgl:
  displays: my_display
  byte_order: little_endian

  # ===========================================================================
  # TOP LAYER — Header bar (always visible above tabview)
  # ===========================================================================
  top_layer:
    widgets:
      - obj:
          id: header_bar_obj
          align: top_left
          width: 1024
          height: 40
          styles: header_bar
          layout:
            type: flex
            flex_flow: row
            flex_align_main: space_between
            flex_align_cross: center
          widgets:

            # Left: Weather icon + outdoor/indoor temps
            - obj:
                width: SIZE_CONTENT
                height: 30
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                layout:
                  type: flex
                  flex_flow: row
                  flex_align_cross: center
                  pad_column: 6
                widgets:
                  - label:
                      text_font: icon_font_small
                      text: $weather
                      text_color: $blue
                  - label:
                      id: temperatures
                      text_font: header_font
                      text: "-° / -°"
                      text_color: $text_primary

            # Center: Clock
            - label:
                id: display_time
                text_font: header_font
                text: "--:--"
                text_color: $text_primary

            # Right: Humidity + status LED
            - obj:
                width: SIZE_CONTENT
                height: 30
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                layout:
                  type: flex
                  flex_flow: row
                  flex_align_cross: center
                  pad_column: 6
                widgets:
                  - label:
                      id: humidity_label
                      text_font: header_font
                      text: "--%"
                      text_color: $text_secondary
                  - label:
                      text_font: icon_font_small
                      text: $water_percent
                      text_color: $blue
                  - led:
                      id: status_led
                      color: 0x00E676
                      brightness: 0

                      width: 12
                      height: 12

  # ===========================================================================
  # TABVIEW — Main navigation (3 tabs)
  # ===========================================================================
  widgets:
    - tabview:
        id: main_tabs
        width: 1024
        height: 560
        position: TOP
        size: 44
        y: 40
        tab_style:
          text_font: label_font
          text_color: $text_secondary
          bg_color: 0x0A0A0A
          bg_opa: COVER
          border_width: 0
          shadow_width: 0
          checked:
            text_color: $amber
        tabs:

          # =================================================================
          # TAB 1: LIGHTS
          # =================================================================
          - name: "Lights"
            id: lights_tab
            bg_color: $page_bg
            bg_opa: COVER
            pad_all: 10
            layout:
              type: flex
              flex_flow: row
              pad_column: 10
            widgets:

              # ----- Left Column: Light Toggles + Scenes -----
              - obj:
                  width: 380
                  height: 500
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: column
                    pad_row: 8
                  widgets:

                    # Light Toggles Card
                    - obj:
                        styles: card_warm
                        width: 380
                        height: 310
                        layout:
                          type: flex
                          flex_flow: column
                          pad_row: 8
                        widgets:
                          - label:
                              styles: section_title
                              text: "Lights"

                          # Row 1: All, Tracks, Floor
                          - obj:
                              width: 356
                              height: 80
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: row
                                pad_column: 6
                              widgets:
                                - button:
                                    id: lr_all_lights_button
                                    width: 114
                                    height: 76
                                    checkable: true
                                    styles: light_button
                                    widgets:
                                      - label:
                                          text_font: icon_font
                                          align: top_mid
                                          y: 2
                                          text: $lightbulb_group
                                      - label:
                                          align: bottom_mid
                                          text_font: small_font
                                          text: "All"
                                    on_click:
                                      - homeassistant.service:
                                          service: light.toggle
                                          data:
                                            entity_id: light.living_room

                                - button:
                                    id: lr_tracks_button
                                    width: 114
                                    height: 76
                                    checkable: true
                                    styles: light_button
                                    widgets:
                                      - label:
                                          text_font: icon_font
                                          align: top_mid
                                          y: 2
                                          text: $track_light
                                      - label:
                                          align: bottom_mid
                                          text_font: small_font
                                          text: "Tracks"
                                    on_click:
                                      - homeassistant.service:
                                          service: light.toggle
                                          data:
                                            entity_id: light.living_room_track_lights

                                - button:
                                    id: lr_floor_lamp_button
                                    width: 114
                                    height: 76
                                    checkable: true
                                    styles: light_button
                                    widgets:
                                      - label:
                                          text_font: icon_font
                                          align: top_mid
                                          y: 2
                                          text: $floor_lamp
                                      - label:
                                          align: bottom_mid
                                          text_font: small_font
                                          text: "Floor"
                                    on_click:
                                      - homeassistant.service:
                                          service: light.toggle
                                          data:
                                            entity_id: light.hue_color_lamp_1_5

                          # Row 2: Table, Strip, Deco
                          - obj:
                              width: 356
                              height: 80
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: row
                                pad_column: 6
                              widgets:
                                - button:
                                    id: lr_table_lamp_button
                                    width: 114
                                    height: 76
                                    checkable: true
                                    styles: light_button
                                    widgets:
                                      - label:
                                          text_font: icon_font
                                          align: top_mid
                                          y: 2
                                          text: $desk_lamp
                                      - label:
                                          align: bottom_mid
                                          text_font: small_font
                                          text: "Table"
                                    on_click:
                                      - homeassistant.service:
                                          service: light.toggle
                                          data:
                                            entity_id: light.hue_color_lamp_1_4

                                - button:
                                    id: lr_tv_strip_button
                                    width: 114
                                    height: 76
                                    checkable: true
                                    styles: light_button
                                    widgets:
                                      - label:
                                          text_font: icon_font
                                          align: top_mid
                                          y: 2
                                          text: $led_strip
                                      - label:
                                          align: bottom_mid
                                          text_font: small_font
                                          text: "Strip"
                                    on_click:
                                      - homeassistant.service:
                                          service: light.toggle
                                          data:
                                            entity_id: light.hue_play_gradient_lightstrip_1

                                - button:
                                    id: lr_art_deco_button
                                    width: 114
                                    height: 76
                                    checkable: true
                                    styles: light_button
                                    widgets:
                                      - label:
                                          text_font: icon_font
                                          align: top_mid
                                          y: 2
                                          text: $lamp
                                      - label:
                                          align: bottom_mid
                                          text_font: small_font
                                          text: "Deco"
                                    on_click:
                                      - homeassistant.service:
                                          service: light.toggle
                                          data:
                                            entity_id: light.living_room_art_deco_lamp

                          # Spacer
                          - obj:
                              width: 356
                              height: 4
                              bg_opa: TRANSP
                              border_width: 0

                    # Scenes Card
                    - obj:
                        styles: card_warm
                        width: 380
                        height: 170
                        layout:
                          type: flex
                          flex_flow: column
                          pad_row: 8
                        widgets:
                          - label:
                              styles: section_title
                              text: "Scenes"
                          - buttonmatrix:
                              id: scene_matrix
                              width: 356
                              height: 110
                              one_checked: true
                              items:
                                bg_color: $surface
                                text_color: $text_primary
                                radius: 8
                                checked:
                                  bg_color: $amber
                                  text_color: $text_primary
                              rows:
                                - buttons:
                                    - text: "Relax"
                                      on_press:
                                        - homeassistant.service:
                                            service: scene.turn_on
                                            data:
                                              entity_id: scene.living_room_relax
                                    - text: "Watch TV"
                                      on_press:
                                        - homeassistant.service:
                                            service: scene.turn_on
                                            data:
                                              entity_id: scene.living_room_watch_tv
                                    - text: "Natural"
                                      on_press:
                                        - homeassistant.service:
                                            service: scene.turn_on
                                            data:
                                              entity_id: scene.living_room_all_day_scene
                                - buttons:
                                    - text: "All Off"
                                      width: 3
                                      on_press:
                                        - homeassistant.service:
                                            service: light.turn_off
                                            data:
                                              entity_id: light.living_room

              # ----- Right Column: Brightness Sliders -----
              - obj:
                  styles: card_warm
                  width: 600
                  height: 500
                  layout:
                    type: flex
                    flex_flow: column
                    pad_row: 6
                  widgets:
                    - label:
                        styles: section_title
                        text: "Brightness"

                    # Slider row
                    - obj:
                        width: 576
                        height: 420
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: row
                          pad_column: 12
                          flex_align_main: space_evenly
                          flex_align_cross: center
                        widgets:

                          # --- All Lights Brightness ---
                          - obj:
                              width: 80
                              height: 400
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: column
                                flex_align_main: center
                                flex_align_cross: center
                                pad_row: 6
                              widgets:
                                - label:
                                    text_font: icon_font_small
                                    text: $lightbulb_group
                                    text_color: $amber
                                - slider:
                                    id: lr_all_brightness_slider
                                    width: 44
                                    height: 320
                                    min_value: 0
                                    max_value: 255
                                    value: 0
                                    mode: NORMAL
                                    styles: brightness_slider
                                    indicator:
                                      styles: brightness_slider_indicator
                                    knob:
                                      styles: brightness_slider_knob
                                    on_release:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: light.living_room
                                            brightness: !lambda return to_string((int)lv_slider_get_value(id(lr_all_brightness_slider)));
                                - label:
                                    id: lr_all_brightness_label
                                    text_font: small_font
                                    text: "0%"
                                    text_color: $text_secondary

                          # --- Tracks Brightness ---
                          - obj:
                              width: 80
                              height: 400
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: column
                                flex_align_main: center
                                flex_align_cross: center
                                pad_row: 6
                              widgets:
                                - label:
                                    text_font: icon_font_small
                                    text: $track_light
                                    text_color: $amber
                                - slider:
                                    id: lr_tracks_brightness_slider
                                    width: 44
                                    height: 320
                                    min_value: 0
                                    max_value: 255
                                    value: 0
                                    mode: NORMAL
                                    styles: brightness_slider
                                    indicator:
                                      styles: brightness_slider_indicator
                                    knob:
                                      styles: brightness_slider_knob
                                    on_release:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: light.living_room_track_lights
                                            brightness: !lambda return to_string((int)lv_slider_get_value(id(lr_tracks_brightness_slider)));
                                - label:
                                    id: lr_tracks_brightness_label
                                    text_font: small_font
                                    text: "0%"
                                    text_color: $text_secondary

                          # --- Floor Lamp Brightness ---
                          - obj:
                              width: 80
                              height: 400
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: column
                                flex_align_main: center
                                flex_align_cross: center
                                pad_row: 6
                              widgets:
                                - label:
                                    text_font: icon_font_small
                                    text: $floor_lamp
                                    text_color: $amber
                                - slider:
                                    id: lr_floor_brightness_slider
                                    width: 44
                                    height: 320
                                    min_value: 0
                                    max_value: 255
                                    value: 0
                                    mode: NORMAL
                                    styles: brightness_slider
                                    indicator:
                                      styles: brightness_slider_indicator
                                    knob:
                                      styles: brightness_slider_knob
                                    on_release:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: light.hue_color_lamp_1_5
                                            brightness: !lambda return to_string((int)lv_slider_get_value(id(lr_floor_brightness_slider)));
                                - label:
                                    id: lr_floor_brightness_label
                                    text_font: small_font
                                    text: "0%"
                                    text_color: $text_secondary

                          # --- Table Lamp Brightness ---
                          - obj:
                              width: 80
                              height: 400
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: column
                                flex_align_main: center
                                flex_align_cross: center
                                pad_row: 6
                              widgets:
                                - label:
                                    text_font: icon_font_small
                                    text: $desk_lamp
                                    text_color: $amber
                                - slider:
                                    id: lr_table_brightness_slider
                                    width: 44
                                    height: 320
                                    min_value: 0
                                    max_value: 255
                                    value: 0
                                    mode: NORMAL
                                    styles: brightness_slider
                                    indicator:
                                      styles: brightness_slider_indicator
                                    knob:
                                      styles: brightness_slider_knob
                                    on_release:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: light.hue_color_lamp_1_4
                                            brightness: !lambda return to_string((int)lv_slider_get_value(id(lr_table_brightness_slider)));
                                - label:
                                    id: lr_table_brightness_label
                                    text_font: small_font
                                    text: "0%"
                                    text_color: $text_secondary

                          # --- TV Strip Brightness ---
                          - obj:
                              width: 80
                              height: 400
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: column
                                flex_align_main: center
                                flex_align_cross: center
                                pad_row: 6
                              widgets:
                                - label:
                                    text_font: icon_font_small
                                    text: $led_strip
                                    text_color: $amber
                                - slider:
                                    id: lr_strip_brightness_slider
                                    width: 44
                                    height: 320
                                    min_value: 0
                                    max_value: 255
                                    value: 0
                                    mode: NORMAL
                                    styles: brightness_slider
                                    indicator:
                                      styles: brightness_slider_indicator
                                    knob:
                                      styles: brightness_slider_knob
                                    on_release:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: light.hue_play_gradient_lightstrip_1
                                            brightness: !lambda return to_string((int)lv_slider_get_value(id(lr_strip_brightness_slider)));
                                - label:
                                    id: lr_strip_brightness_label
                                    text_font: small_font
                                    text: "0%"
                                    text_color: $text_secondary

                          # --- Art Deco Brightness ---
                          - obj:
                              width: 80
                              height: 400
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: column
                                flex_align_main: center
                                flex_align_cross: center
                                pad_row: 6
                              widgets:
                                - label:
                                    text_font: icon_font_small
                                    text: $lamp
                                    text_color: $amber
                                - slider:
                                    id: lr_deco_brightness_slider
                                    width: 44
                                    height: 320
                                    min_value: 0
                                    max_value: 255
                                    value: 0
                                    mode: NORMAL
                                    styles: brightness_slider
                                    indicator:
                                      styles: brightness_slider_indicator
                                    knob:
                                      styles: brightness_slider_knob
                                    on_release:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: light.living_room_art_deco_lamp
                                            brightness: !lambda return to_string((int)lv_slider_get_value(id(lr_deco_brightness_slider)));
                                - label:
                                    id: lr_deco_brightness_label
                                    text_font: small_font
                                    text: "0%"
                                    text_color: $text_secondary


          # =================================================================
          # TAB 2: CLIMATE (Blinds + Fan + Environment)
          # =================================================================
          - name: "Climate"
            id: climate_tab
            bg_color: $page_bg
            bg_opa: COVER
            pad_all: 10
            layout:
              type: flex
              flex_flow: row
              pad_column: 10
            widgets:

              # ----- Left: Blinds Card -----
              - obj:
                  styles: card_cool
                  width: 320
                  height: 380
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    pad_row: 6
                  widgets:
                    - label:
                        styles: section_title
                        text: "Blinds"
                        align: LEFT_MID

                    # Blind Arc
                    - arc:
                        id: lr_blind_arc
                        width: 200
                        height: 200
                        min_value: 0
                        max_value: 100
                        value: 50
                        start_angle: 135
                        end_angle: 45
                        adjustable: true
                        mode: NORMAL
                        indicator:
                          styles: control_arc_indicator
                        knob:
                          styles: control_arc_knob
                        on_release:
                          - homeassistant.service:
                              service: cover.set_cover_position
                              data:
                                entity_id: cover.living_room_blind
                                position: !lambda return to_string((int)lv_arc_get_value(id(lr_blind_arc)));
                        widgets:
                          - label:
                              id: lr_blind_value_label
                              align: center
                              text_font: value_font_medium
                              text: "50%"
                              text_color: $text_primary
                          - label:
                              align: center
                              y: 28
                              text_font: small_font
                              text: "Position"
                              text_color: $text_secondary

                    # Quick buttons: Open / Stop / Close
                    - obj:
                        width: 296
                        height: 50
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: row
                          pad_column: 6
                          flex_align_main: space_evenly
                        widgets:
                          - button:
                              width: 90
                              height: 44
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "Open"
                              on_click:
                                - homeassistant.service:
                                    service: cover.open_cover
                                    data:
                                      entity_id: cover.living_room_blind

                          - button:
                              width: 90
                              height: 44
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "Stop"
                              on_click:
                                - homeassistant.service:
                                    service: cover.stop_cover
                                    data:
                                      entity_id: cover.living_room_blind

                          - button:
                              width: 90
                              height: 44
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "Close"
                              on_click:
                                - homeassistant.service:
                                    service: cover.close_cover
                                    data:
                                      entity_id: cover.living_room_blind

              # ----- Center: Fan Card -----
              - obj:
                  styles: card_cool
                  width: 320
                  height: 380
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    pad_row: 6
                  widgets:
                    - label:
                        styles: section_title
                        text: "Ceiling Fan"
                        align: LEFT_MID

                    # Fan Arc
                    - arc:
                        id: lr_fan_arc
                        width: 200
                        height: 200
                        min_value: 0
                        max_value: 100
                        value: 0
                        start_angle: 135
                        end_angle: 45
                        adjustable: true
                        mode: NORMAL
                        indicator:
                          styles: fan_arc_indicator
                        knob:
                          styles: fan_arc_knob
                        on_release:
                          - homeassistant.service:
                              service: fan.set_percentage
                              data:
                                entity_id: fan.living_room_fans
                                percentage: !lambda |-
                                  int val = (int)lv_arc_get_value(id(lr_fan_arc));
                                  if (val < 17) return "0";
                                  if (val < 50) return "33";
                                  if (val < 83) return "66";
                                  return "100";
                        widgets:
                          - label:
                              id: lr_fan_value_label
                              align: center
                              text_font: value_font_medium
                              text: "Off"
                              text_color: $text_primary
                          - label:
                              align: center
                              y: 28
                              text_font: small_font
                              text: "Speed"
                              text_color: $text_secondary

                    # Quick buttons: Off / Low / Med / High
                    - obj:
                        width: 296
                        height: 50
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: row
                          pad_column: 4
                          flex_align_main: space_evenly
                        widgets:
                          - button:
                              id: lr_fan_off_button
                              width: 68
                              height: 44
                              checkable: true
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "Off"
                              on_click:
                                - homeassistant.service:
                                    service: fan.turn_off
                                    data:
                                      entity_id: fan.living_room_fans

                          - button:
                              id: lr_fan_low_button
                              width: 68
                              height: 44
                              checkable: true
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "Low"
                              on_click:
                                - homeassistant.service:
                                    service: fan.set_percentage
                                    data:
                                      entity_id: fan.living_room_fans
                                      percentage: "33"

                          - button:
                              id: lr_fan_med_button
                              width: 68
                              height: 44
                              checkable: true
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "Med"
                              on_click:
                                - homeassistant.service:
                                    service: fan.set_percentage
                                    data:
                                      entity_id: fan.living_room_fans
                                      percentage: "66"

                          - button:
                              id: lr_fan_high_button
                              width: 68
                              height: 44
                              checkable: true
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "High"
                              on_click:
                                - homeassistant.service:
                                    service: fan.set_percentage
                                    data:
                                      entity_id: fan.living_room_fans
                                      percentage: "100"

              # ----- Right: Environment Card -----
              - obj:
                  styles: card_cool
                  width: 330
                  height: 380
                  layout:
                    type: flex
                    flex_flow: column
                    pad_row: 16
                  widgets:
                    - label:
                        styles: section_title
                        text: "Environment"

                    # Indoor Temperature
                    - obj:
                        width: 306
                        height: 90
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: column
                          pad_row: 4
                        widgets:
                          - obj:
                              width: 306
                              height: 30
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: row
                                flex_align_main: space_between
                                flex_align_cross: center
                              widgets:
                                - obj:
                                    width: SIZE_CONTENT
                                    height: 24
                                    bg_opa: TRANSP
                                    border_width: 0
                                    pad_all: 0
                                    layout:
                                      type: flex
                                      flex_flow: row
                                      pad_column: 6
                                      flex_align_cross: center
                                    widgets:
                                      - label:
                                          text_font: icon_font_small
                                          text: $thermometer
                                          text_color: $amber
                                      - label:
                                          text_font: label_font
                                          text: "Indoor"
                                          text_color: $text_secondary
                                - label:
                                    id: env_indoor_temp_label
                                    text_font: value_font_medium
                                    text: "--°"
                                    text_color: $text_primary
                          - bar:
                              id: env_indoor_temp_bar
                              width: 306
                              height: 16
                              min_value: -10
                              max_value: 40
                              value: 20
                              styles: env_bar
                              indicator:
                                styles: temp_bar_indicator

                    # Humidity
                    - obj:
                        width: 306
                        height: 90
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: column
                          pad_row: 4
                        widgets:
                          - obj:
                              width: 306
                              height: 30
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: row
                                flex_align_main: space_between
                                flex_align_cross: center
                              widgets:
                                - obj:
                                    width: SIZE_CONTENT
                                    height: 24
                                    bg_opa: TRANSP
                                    border_width: 0
                                    pad_all: 0
                                    layout:
                                      type: flex
                                      flex_flow: row
                                      pad_column: 6
                                      flex_align_cross: center
                                    widgets:
                                      - label:
                                          text_font: icon_font_small
                                          text: $water_percent
                                          text_color: $blue
                                      - label:
                                          text_font: label_font
                                          text: "Humidity"
                                          text_color: $text_secondary
                                - label:
                                    id: env_humidity_label
                                    text_font: value_font_medium
                                    text: "--%"
                                    text_color: $text_primary
                          - bar:
                              id: env_humidity_bar
                              width: 306
                              height: 16
                              min_value: 0
                              max_value: 100
                              value: 40
                              styles: env_bar
                              indicator:
                                styles: humidity_bar_indicator

                    # Outdoor Temperature
                    - obj:
                        width: 306
                        height: 90
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: column
                          pad_row: 4
                        widgets:
                          - obj:
                              width: 306
                              height: 30
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: row
                                flex_align_main: space_between
                                flex_align_cross: center
                              widgets:
                                - obj:
                                    width: SIZE_CONTENT
                                    height: 24
                                    bg_opa: TRANSP
                                    border_width: 0
                                    pad_all: 0
                                    layout:
                                      type: flex
                                      flex_flow: row
                                      pad_column: 6
                                      flex_align_cross: center
                                    widgets:
                                      - label:
                                          text_font: icon_font_small
                                          text: $weather
                                          text_color: $blue
                                      - label:
                                          text_font: label_font
                                          text: "Outdoor"
                                          text_color: $text_secondary
                                - label:
                                    id: env_outdoor_temp_label
                                    text_font: value_font_medium
                                    text: "--°"
                                    text_color: $text_primary
                          - bar:
                              id: env_outdoor_temp_bar
                              width: 306
                              height: 16
                              min_value: -20
                              max_value: 45
                              value: 15
                              styles: env_bar
                              indicator:
                                styles: temp_bar_indicator


          # =================================================================
          # TAB 3: MEDIA (Devices + Sonos)
          # =================================================================
          - name: "Media"
            id: media_tab
            bg_color: $page_bg
            bg_opa: COVER
            pad_all: 10
            layout:
              type: flex
              flex_flow: row
              pad_column: 10
            widgets:

              # ----- Left: Device Toggles -----
              - obj:
                  styles: card_purple
                  width: 350
                  height: 500
                  layout:
                    type: flex
                    flex_flow: column
                    pad_row: 8
                  widgets:
                    - label:
                        styles: section_title
                        text: "Devices"

                    # TV Row
                    - obj:
                        styles: device_row
                        width: 326
                        height: 60
                        layout:
                          type: flex
                          flex_flow: row
                          flex_align_main: space_between
                          flex_align_cross: center
                          pad_column: 10
                        widgets:
                          - led:
                              id: lr_tv_led
                              color: 0x00E676
                              brightness: 0
        
                              width: 14
                              height: 14
                          - label:
                              text_font: icon_font
                              text: $television
                              text_color: $text_primary
                          - label:
                              text_font: label_font
                              text: "TV"
                              text_color: $text_primary
                              width: 120
                          - switch:
                              id: lr_tv_switch
                              width: 56
                              height: 28
                              on_click:
                                - homeassistant.service:
                                    service: media_player.toggle
                                    data:
                                      entity_id: media_player.living_room_tv

                    # Apple TV Row
                    - obj:
                        styles: device_row
                        width: 326
                        height: 60
                        layout:
                          type: flex
                          flex_flow: row
                          flex_align_main: space_between
                          flex_align_cross: center
                          pad_column: 10
                        widgets:
                          - led:
                              id: lr_appletv_led
                              color: 0x00E676
                              brightness: 0
        
                              width: 14
                              height: 14
                          - label:
                              text_font: icon_font
                              text: $apple
                              text_color: $text_primary
                          - label:
                              text_font: label_font
                              text: "Apple TV"
                              text_color: $text_primary
                              width: 120
                          - switch:
                              id: lr_appletv_switch
                              width: 56
                              height: 28
                              on_click:
                                - homeassistant.service:
                                    service: remote.toggle
                                    data:
                                      entity_id: remote.living_room_apple_tv

                    # PS5 Row
                    - obj:
                        styles: device_row
                        width: 326
                        height: 60
                        layout:
                          type: flex
                          flex_flow: row
                          flex_align_main: space_between
                          flex_align_cross: center
                          pad_column: 10
                        widgets:
                          - led:
                              id: lr_ps5_led
                              color: 0x00E676
                              brightness: 0
        
                              width: 14
                              height: 14
                          - label:
                              text_font: icon_font
                              text: $playstation
                              text_color: $text_primary
                          - label:
                              text_font: label_font
                              text: "PS5"
                              text_color: $text_primary
                              width: 120
                          - switch:
                              id: lr_ps5_switch
                              width: 56
                              height: 28
                              on_click:
                                - homeassistant.service:
                                    service: switch.toggle
                                    data:
                                      entity_id: switch.ps5_power

                    # Sonos Plug Row
                    - obj:
                        styles: device_row
                        width: 326
                        height: 60
                        layout:
                          type: flex
                          flex_flow: row
                          flex_align_main: space_between
                          flex_align_cross: center
                          pad_column: 10
                        widgets:
                          - led:
                              id: lr_sonos_led
                              color: 0x00E676
                              brightness: 0
        
                              width: 14
                              height: 14
                          - label:
                              text_font: icon_font
                              text: $speaker
                              text_color: $text_primary
                          - label:
                              text_font: label_font
                              text: "Sonos"
                              text_color: $text_primary
                              width: 120
                          - switch:
                              id: lr_sonos_switch
                              width: 56
                              height: 28
                              on_click:
                                - homeassistant.service:
                                    service: switch.toggle
                                    data:
                                      entity_id: switch.sonos_living_room_plug

              # ----- Right: Sonos Controls -----
              - obj:
                  styles: card_purple
                  width: 620
                  height: 500
                  layout:
                    type: flex
                    flex_flow: column
                    pad_row: 10
                  widgets:
                    - label:
                        styles: section_title
                        text: "Sonos"

                    # Now Playing Info
                    - obj:
                        width: 596
                        height: 80
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: row
                          pad_column: 12
                          flex_align_cross: center
                        widgets:
                          - label:
                              text_font: icon_font
                              text: $speaker
                              text_color: $purple
                          - obj:
                              width: 500
                              height: 70
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: column
                                pad_row: 4
                              widgets:
                                - label:
                                    id: lr_sonos_title
                                    text_font: card_title_font
                                    text: "No media"
                                    text_color: $text_primary
                                    long_mode: DOT
                                    width: 490
                                - label:
                                    id: lr_sonos_artist
                                    text_font: label_font
                                    text: "--"
                                    text_color: $text_secondary
                                    long_mode: DOT
                                    width: 490

                    # Transport Controls
                    - obj:
                        width: 596
                        height: 80
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: row
                          pad_column: 16
                          flex_align_main: center
                          flex_align_cross: center
                        widgets:
                          # Previous
                          - button:
                              width: 56
                              height: 56
                              styles: transport_button
                              widgets:
                                - label:
                                    text_font: icon_font
                                    align: center
                                    text: $skip_previous
                              on_click:
                                - homeassistant.service:
                                    service: media_player.media_previous_track
                                    data:
                                      entity_id: media_player.living_room_sonos

                          # Play/Pause (large, glowing)
                          - button:
                              id: lr_play_pause_button
                              width: 68
                              height: 68
                              styles: transport_play
                              widgets:
                                - label:
                                    id: lr_play_pause_icon
                                    text_font: icon_font
                                    align: center
                                    text: $play
                              on_click:
                                - homeassistant.service:
                                    service: media_player.media_play_pause
                                    data:
                                      entity_id: media_player.living_room_sonos

                          # Next
                          - button:
                              width: 56
                              height: 56
                              styles: transport_button
                              widgets:
                                - label:
                                    text_font: icon_font
                                    align: center
                                    text: $skip_next
                              on_click:
                                - homeassistant.service:
                                    service: media_player.media_next_track
                                    data:
                                      entity_id: media_player.living_room_sonos

                          # Stop
                          - button:
                              width: 56
                              height: 56
                              styles: transport_button
                              widgets:
                                - label:
                                    text_font: icon_font
                                    align: center
                                    text: $stop_circle
                              on_click:
                                - homeassistant.service:
                                    service: media_player.media_stop
                                    data:
                                      entity_id: media_player.living_room_sonos

                    # Volume Control
                    - obj:
                        width: 596
                        height: 70
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: row
                          pad_column: 10
                          flex_align_cross: center
                        widgets:
                          - label:
                              text_font: icon_font_small
                              text: $volume_high
                              text_color: $purple
                          - slider:
                              id: lr_volume_slider
                              width: 430
                              height: 24
                              min_value: 0
                              max_value: 100
                              value: 30
                              mode: NORMAL
                              styles: volume_slider
                              indicator:
                                styles: volume_slider_indicator
                              knob:
                                styles: volume_slider_knob
                              on_release:
                                - homeassistant.service:
                                    service: media_player.volume_set
                                    data:
                                      entity_id: media_player.living_room_sonos
                                      volume_level: !lambda return to_string(lv_slider_get_value(id(lr_volume_slider)) / 100.0);
                          - label:
                              id: lr_volume_label
                              text_font: label_font
                              text: "30%"
                              text_color: $text_secondary
                              width: 50
                          - button:
                              id: lr_mute_button
                              width: 48
                              height: 40
                              checkable: true
                              styles: transport_button
                              widgets:
                                - label:
                                    text_font: icon_font_small
                                    align: center
                                    text: $volume_mute
                              on_click:
                                - homeassistant.service:
                                    service: media_player.volume_mute
                                    data:
                                      entity_id: media_player.living_room_sonos
                                      is_volume_muted: !lambda |-
                                        return id(lr_sonos_muted).state ? "false" : "true";
