lvgl:
  displays: my_display
  byte_order: little_endian

  top_layer:
    widgets:

      # Temperature (outdoor / indoor)
      - label:
          text: "-° / -°"
          id: temperatures
          text_font: clockbar_font
          align: top_left
          x: 8
          y: 8
          text_color: 0xFFFFFF

      # Clock
      - label:
          text: "--:--"
          id: display_time
          text_font: clockbar_font
          align: top_mid
          x: 0
          y: 8
          text_align: center
          text_color: 0xFFFFFF

      # ===========================
      # BOTTOM NAVIGATION BAR
      # ===========================
      - obj:
          align: bottom_left
          width: 100%
          height: 56
          bg_color: 0x1A1A1A
          bg_opa: COVER
          border_width: 0
          pad_all: 0
          layout:
            type: flex
            flex_flow: row
          widgets:

            # Nav: Lights
            - button:
                id: nav_lights_button
                width: 341
                height: 52
                styles: nav_button_active
                checkable: false
                widgets:
                  - label:
                      text_font: nav_icon_font
                      align: center
                      text: $nav_lightbulb
                on_click:
                  - lvgl.page.show: lights_page
                  - lvgl.widget.update:
                      id: nav_lights_button
                      styles: nav_button_active
                  - lvgl.widget.update:
                      id: nav_blinds_button
                      styles: nav_button
                  - lvgl.widget.update:
                      id: nav_entertainment_button
                      styles: nav_button

            # Nav: Blinds & Fan
            - button:
                id: nav_blinds_button
                width: 341
                height: 52
                styles: nav_button
                checkable: false
                widgets:
                  - label:
                      text_font: nav_icon_font
                      align: center
                      text: $nav_blinds
                on_click:
                  - lvgl.page.show: blinds_fan_page
                  - lvgl.widget.update:
                      id: nav_lights_button
                      styles: nav_button
                  - lvgl.widget.update:
                      id: nav_blinds_button
                      styles: nav_button_active
                  - lvgl.widget.update:
                      id: nav_entertainment_button
                      styles: nav_button

            # Nav: Entertainment
            - button:
                id: nav_entertainment_button
                width: 342
                height: 52
                styles: nav_button
                checkable: false
                widgets:
                  - label:
                      text_font: nav_icon_font
                      align: center
                      text: $nav_tv
                on_click:
                  - lvgl.page.show: entertainment_page
                  - lvgl.widget.update:
                      id: nav_lights_button
                      styles: nav_button
                  - lvgl.widget.update:
                      id: nav_blinds_button
                      styles: nav_button
                  - lvgl.widget.update:
                      id: nav_entertainment_button
                      styles: nav_button_active

  # ===========================
  # PAGES
  # ===========================
  pages:

    # ===========================
    # PAGE 1: LIGHTS & SCENES
    # ===========================
    - id: lights_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 60
      pad_left: 5
      pad_right: 5

      widgets:

        # All Lights
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_all_lights_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lightbulb_group
              - label:
                  align: bottom_left
                  text: "All Lights"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.living_room

        # Track Lights
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_tracks_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $track_light
              - label:
                  align: bottom_left
                  text: "Tracks"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.living_room_track_lights

        # Floor Lamp
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_floor_lamp_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $floor_lamp
              - label:
                  align: bottom_left
                  text: "Floor Lamp"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.hue_color_lamp_1_5

        # Table Lamp
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_table_lamp_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $desk_lamp
              - label:
                  align: bottom_left
                  text: "Table Lamp"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.hue_color_lamp_1_4

        # TV Lightstrip
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_tv_strip_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $led_strip
              - label:
                  align: bottom_left
                  text: "TV Strip"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.hue_play_gradient_lightstrip_1

        # Art Deco Lamp
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_art_deco_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $lamp
              - label:
                  align: bottom_left
                  text: "Art Deco"
            on_click:
              - homeassistant.service:
                  service: light.toggle
                  data:
                    entity_id: light.living_room_art_deco_lamp

        # Scene: Relax
        - button:
            height: $button_height
            width: $button_width
            checkable: false
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $sofa
              - label:
                  align: bottom_left
                  text: "Relax"
            on_click:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.living_room_relax

        # Scene: Watch TV
        - button:
            height: $button_height
            width: $button_width
            checkable: false
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $television_classic
              - label:
                  align: bottom_left
                  text: "Watch TV"
            on_click:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.living_room_watch_tv

        # Scene: Natural Light
        - button:
            height: $button_height
            width: $button_width
            checkable: false
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $sunny
              - label:
                  align: bottom_left
                  text: "Natural"
            on_click:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.living_room_all_day_scene

        # Scene: All Off
        - button:
            height: $button_height
            width: $button_width
            checkable: false
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $power
              - label:
                  align: bottom_left
                  text: "All Off"
            on_click:
              - homeassistant.service:
                  service: scene.turn_on
                  data:
                    entity_id: scene.time_for_bed


    # ===========================
    # PAGE 2: BLINDS & FAN
    # ===========================
    - id: blinds_fan_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 60
      pad_left: 5
      pad_right: 5

      widgets:

        # Blind: Open (100%)
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_blind_open_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Open"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.living_room_blind
                    position: "100"

        # Blind: 3/4 Open (75%)
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_blind_75_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "3/4 Open"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.living_room_blind
                    position: "75"

        # Blind: Half (50%)
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_blind_50_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "Half"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.living_room_blind
                    position: "50"

        # Blind: 1/4 Open (25%)
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_blind_25_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_open
              - label:
                  align: bottom_left
                  text: "1/4 Open"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.living_room_blind
                    position: "25"

        # Blind: Closed (0%)
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_blind_closed_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $blinds_closed
              - label:
                  align: bottom_left
                  text: "Closed"
            on_click:
              - homeassistant.service:
                  service: cover.set_cover_position
                  data:
                    entity_id: cover.living_room_blind
                    position: "0"

        # Fan: Off
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_fan_off_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $fan_off
              - label:
                  align: bottom_left
                  text: "Fan Off"
            on_click:
              - homeassistant.service:
                  service: fan.turn_off
                  data:
                    entity_id: fan.living_room_fans

        # Fan: Low (33%)
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_fan_low_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $fan_speed_1
              - label:
                  align: bottom_left
                  text: "Fan Low"
            on_click:
              - homeassistant.service:
                  service: fan.set_percentage
                  data:
                    entity_id: fan.living_room_fans
                    percentage: 33

        # Fan: Medium (66%)
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_fan_med_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $fan_speed_2
              - label:
                  align: bottom_left
                  text: "Fan Med"
            on_click:
              - homeassistant.service:
                  service: fan.set_percentage
                  data:
                    entity_id: fan.living_room_fans
                    percentage: 66

        # Fan: High (100%)
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_fan_high_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $fan_speed_3
              - label:
                  align: bottom_left
                  text: "Fan High"
            on_click:
              - homeassistant.service:
                  service: fan.set_percentage
                  data:
                    entity_id: fan.living_room_fans
                    percentage: 100


    # ===========================
    # PAGE 3: ENTERTAINMENT
    # ===========================
    - id: entertainment_page
      layout:
        type: flex
        flex_flow: column_wrap
        pad_row: 10
        pad_column: 10
      width: 100%
      bg_color: Black
      bg_opa: cover
      pad_top: 42
      pad_bottom: 60
      pad_left: 5
      pad_right: 5

      widgets:

        # TV Power
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_tv_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $television
              - label:
                  align: bottom_left
                  text: "TV"
            on_click:
              - homeassistant.service:
                  service: media_player.toggle
                  data:
                    entity_id: media_player.living_room_tv

        # Apple TV
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_appletv_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $apple
              - label:
                  align: bottom_left
                  text: "Apple TV"
            on_click:
              - homeassistant.service:
                  service: remote.toggle
                  data:
                    entity_id: remote.living_room_apple_tv

        # PS5
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_ps5_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $playstation
              - label:
                  align: bottom_left
                  text: "PS5"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.ps5_power

        # Sonos
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_sonos_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $speaker
              - label:
                  align: bottom_left
                  text: "Sonos"
            on_click:
              - homeassistant.service:
                  service: switch.toggle
                  data:
                    entity_id: switch.sonos_living_room_plug

        # Volume Up
        - button:
            height: $button_height
            width: $button_width
            checkable: false
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $volume_plus
              - label:
                  align: bottom_left
                  text: "Vol +"
            on_click:
              - homeassistant.service:
                  service: media_player.volume_up
                  data:
                    entity_id: media_player.living_room_sonos

        # Volume Down
        - button:
            height: $button_height
            width: $button_width
            checkable: false
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $volume_minus
              - label:
                  align: bottom_left
                  text: "Vol -"
            on_click:
              - homeassistant.service:
                  service: media_player.volume_down
                  data:
                    entity_id: media_player.living_room_sonos

        # Mute
        - button:
            height: $button_height
            width: $button_width
            checkable: true
            id: lr_mute_button
            styles: control
            widgets:
              - label:
                  text_font: $icon_font
                  align: top_left
                  text: $volume_mute
              - label:
                  align: bottom_left
                  text: "Mute"
            on_click:
              - homeassistant.service:
                  service: media_player.volume_mute
                  data:
                    entity_id: media_player.living_room_sonos
                    is_volume_muted: !lambda return !id(lr_sonos_muted).state;
