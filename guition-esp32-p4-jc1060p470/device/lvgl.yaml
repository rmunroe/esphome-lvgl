# =============================================================================
# LVGL UI LAYOUT — Modern card-based dashboard with tabview navigation
# =============================================================================
# Display: 1024x600 (7" MIPI DSI)
# Layout:  Header (40px) + Tabview (560px) with 4 tabs
#          Tab 1: Lights — toggles + brightness sliders + scenes
#          Tab 2: Climate — blind arc + fan arc + environment bars
#          Tab 3: Music — device switches + Amp controls
#          Tab 4: TV — Apple TV, Arc audio, Hue Sync
# =============================================================================

lvgl:
  displays: my_display
  byte_order: little_endian
  bg_color: $page_bg
  bg_opa: COVER

  # ===========================================================================
  # TOP LAYER — Header bar (always visible above tabview)
  # ===========================================================================
  top_layer:
    widgets:
      - obj:
          id: header_bar_obj
          align: top_left
          width: 1024
          height: 40
          styles: header_bar
          layout:
            type: flex
            flex_flow: row
            flex_align_main: space_between
            flex_align_cross: center
          widgets:

            # Left: Weather icon + outdoor/indoor temps
            - obj:
                width: SIZE_CONTENT
                height: 30
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                layout:
                  type: flex
                  flex_flow: row
                  flex_align_cross: center
                  pad_column: 6
                widgets:
                  - label:
                      text_font: icon_font_small
                      text: $weather
                      text_color: $blue
                  - label:
                      id: temperatures
                      text_font: header_font
                      text: "-° / -°"
                      text_color: $text_primary

            # Center: Clock
            - label:
                id: display_time
                text_font: header_font
                text: "--:-- --"
                text_color: $text_primary

            # Right: Humidity + status LED
            - obj:
                width: SIZE_CONTENT
                height: 30
                bg_opa: TRANSP
                border_width: 0
                pad_all: 0
                layout:
                  type: flex
                  flex_flow: row
                  flex_align_cross: center
                  pad_column: 6
                widgets:
                  - label:
                      id: humidity_label
                      text_font: header_font
                      text: "--%"
                      text_color: $text_secondary
                  - label:
                      text_font: icon_font_small
                      text: $water_percent
                      text_color: $blue
                  - led:
                      id: status_led
                      color: 0x00E676
                      brightness: 0

                      width: 12
                      height: 12

  # ===========================================================================
  # TABVIEW — Main navigation (4 tabs)
  # ===========================================================================
  widgets:
    - tabview:
        id: main_tabs
        width: 1024
        height: 560
        position: TOP
        size: 44
        y: 40
        tab_style:
          text_font: label_font
          text_color: $text_secondary
          bg_color: 0x0A0A0A
          bg_opa: COVER
          border_width: 0
          shadow_width: 0
          checked:
            text_color: $blue
        tabs:

          # =================================================================
          # TAB 1: LIGHTS
          # =================================================================
          - name: "Lights"
            id: lights_tab
            bg_color: $page_bg
            bg_opa: COVER
            pad_all: 10
            layout:
              type: flex
              flex_flow: column
              pad_row: 8
            widgets:

              # ----- Scene Buttons Row -----
              - obj:
                  width: 984
                  height: 60
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: row
                    pad_column: 8
                    flex_align_main: center
                    flex_align_cross: center
                  widgets:
                    - button:
                        id: lr_all_off_button
                        checkable: true
                        width: 220
                        height: 54
                        styles: scene_button
                        checked:
                          styles: scene_button_checked
                        widgets:
                          - label:
                              align: center
                              text_font: label_font
                              text: "All Off"
                              text_color: $text_primary
                        on_click:
                          - lvgl.widget.update:
                              id: [lr_energize_button, lr_read_button, lr_relax_button]
                              state:
                                checked: false
                          - homeassistant.service:
                              service: light.turn_off
                              data:
                                entity_id: light.living_room
                    - button:
                        id: lr_energize_button
                        checkable: true
                        width: 180
                        height: 54
                        styles: scene_button
                        checked:
                          styles: scene_button_checked
                        widgets:
                          - label:
                              align: center
                              text_font: label_font
                              text: "Energize"
                              text_color: $text_primary
                        on_click:
                          - lvgl.widget.update:
                              id: [lr_all_off_button, lr_read_button, lr_relax_button]
                              state:
                                checked: false
                          - homeassistant.service:
                              service: scene.turn_on
                              data:
                                entity_id: scene.living_room_energize
                    - button:
                        id: lr_read_button
                        checkable: true
                        width: 180
                        height: 54
                        styles: scene_button
                        checked:
                          styles: scene_button_checked
                        widgets:
                          - label:
                              align: center
                              text_font: label_font
                              text: "Read"
                              text_color: $text_primary
                        on_click:
                          - lvgl.widget.update:
                              id: [lr_all_off_button, lr_energize_button, lr_relax_button]
                              state:
                                checked: false
                          - homeassistant.service:
                              service: scene.turn_on
                              data:
                                entity_id: scene.living_room_read
                    - button:
                        id: lr_relax_button
                        checkable: true
                        width: 180
                        height: 54
                        styles: scene_button
                        checked:
                          styles: scene_button_checked
                        widgets:
                          - label:
                              align: center
                              text_font: label_font
                              text: "Relax"
                              text_color: $text_primary
                        on_click:
                          - lvgl.widget.update:
                              id: [lr_all_off_button, lr_energize_button, lr_read_button]
                              state:
                                checked: false
                          - homeassistant.service:
                              service: scene.turn_on
                              data:
                                entity_id: scene.living_room_relax

              # ----- Separator Line -----
              - line:
                  width: 984
                  height: 4
                  points:
                    - 0, 2
                    - 980, 2
                  line_color: $text_disabled
                  line_width: 1

              # ----- Main Content: Light Rows + Other Rooms -----
              - obj:
                  width: 984
                  height: 400
                  bg_opa: TRANSP
                  border_width: 0
                  pad_all: 0
                  layout:
                    type: flex
                    flex_flow: row
                    pad_column: 4
                  widgets:

                    # ---- Left: Light Controls Column ----
                    - obj:
                        width: 680
                        height: 396
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: column
                          pad_row: 10
                          flex_align_main: center
                        widgets:

                          # --- Track Lights Row ---
                          - obj:
                              width: 676
                              height: 70
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: row
                                pad_column: 16
                                flex_align_cross: center
                              widgets:
                                - button:
                                    id: lr_tracks_button
                                    width: 200
                                    height: 65
                                    checkable: true
                                    styles: light_button
                                    widgets:
                                      - label:
                                          align: center
                                          text_font: label_font
                                          text: "Track Lights"
                                    on_click:
                                      - homeassistant.service:
                                          service: light.toggle
                                          data:
                                            entity_id: light.living_room_track_lights
                                - slider:
                                    id: lr_tracks_brightness_slider
                                    width: 300
                                    height: 40
                                    min_value: 0
                                    max_value: 255
                                    value: 0
                                    mode: NORMAL
                                    styles: brightness_slider
                                    indicator:
                                      styles: brightness_slider_indicator
                                    knob:
                                      styles: brightness_slider_knob
                                    on_release:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: light.living_room_track_lights
                                            brightness: !lambda return to_string((int)lv_slider_get_value(id(lr_tracks_brightness_slider)));
                                - label:
                                    id: lr_tracks_brightness_label
                                    width: 56
                                    text_font: small_font
                                    text: "0%"
                                    text_color: $text_secondary
                                    text_align: right

                          # --- Floor Lamp Row ---
                          - obj:
                              width: 676
                              height: 70
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: row
                                pad_column: 16
                                flex_align_cross: center
                              widgets:
                                - button:
                                    id: lr_floor_lamp_button
                                    width: 200
                                    height: 65
                                    checkable: true
                                    styles: light_button
                                    widgets:
                                      - label:
                                          align: center
                                          text_font: label_font
                                          text: "Floor Lamp"
                                    on_click:
                                      - homeassistant.service:
                                          service: light.toggle
                                          data:
                                            entity_id: light.hue_color_lamp_1_5
                                - slider:
                                    id: lr_floor_brightness_slider
                                    width: 300
                                    height: 40
                                    min_value: 0
                                    max_value: 255
                                    value: 0
                                    mode: NORMAL
                                    styles: brightness_slider
                                    indicator:
                                      styles: brightness_slider_indicator
                                    knob:
                                      styles: brightness_slider_knob
                                    on_release:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: light.hue_color_lamp_1_5
                                            brightness: !lambda return to_string((int)lv_slider_get_value(id(lr_floor_brightness_slider)));
                                - label:
                                    id: lr_floor_brightness_label
                                    width: 56
                                    text_font: small_font
                                    text: "0%"
                                    text_color: $text_secondary
                                    text_align: right

                          # --- Table Lamp Row ---
                          - obj:
                              width: 676
                              height: 70
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: row
                                pad_column: 16
                                flex_align_cross: center
                              widgets:
                                - button:
                                    id: lr_table_lamp_button
                                    width: 200
                                    height: 65
                                    checkable: true
                                    styles: light_button
                                    widgets:
                                      - label:
                                          align: center
                                          text_font: label_font
                                          text: "Table Lamp"
                                    on_click:
                                      - homeassistant.service:
                                          service: light.toggle
                                          data:
                                            entity_id: light.hue_color_lamp_1_4
                                - slider:
                                    id: lr_table_brightness_slider
                                    width: 300
                                    height: 40
                                    min_value: 0
                                    max_value: 255
                                    value: 0
                                    mode: NORMAL
                                    styles: brightness_slider
                                    indicator:
                                      styles: brightness_slider_indicator
                                    knob:
                                      styles: brightness_slider_knob
                                    on_release:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: light.hue_color_lamp_1_4
                                            brightness: !lambda return to_string((int)lv_slider_get_value(id(lr_table_brightness_slider)));
                                - label:
                                    id: lr_table_brightness_label
                                    width: 56
                                    text_font: small_font
                                    text: "0%"
                                    text_color: $text_secondary
                                    text_align: right

                          # --- Art Deco Lamp Row ---
                          - obj:
                              width: 676
                              height: 70
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: row
                                pad_column: 16
                                flex_align_cross: center
                              widgets:
                                - button:
                                    id: lr_art_deco_button
                                    width: 200
                                    height: 65
                                    checkable: true
                                    styles: light_button
                                    widgets:
                                      - label:
                                          align: center
                                          text_font: label_font
                                          text: "Art Deco"
                                    on_click:
                                      - homeassistant.service:
                                          service: light.toggle
                                          data:
                                            entity_id: light.living_room_art_deco_lamp
                                - slider:
                                    id: lr_deco_brightness_slider
                                    width: 300
                                    height: 40
                                    min_value: 0
                                    max_value: 255
                                    value: 0
                                    mode: NORMAL
                                    styles: brightness_slider
                                    indicator:
                                      styles: brightness_slider_indicator
                                    knob:
                                      styles: brightness_slider_knob
                                    on_release:
                                      - homeassistant.service:
                                          service: light.turn_on
                                          data:
                                            entity_id: light.living_room_art_deco_lamp
                                            brightness: !lambda return to_string((int)lv_slider_get_value(id(lr_deco_brightness_slider)));
                                - label:
                                    id: lr_deco_brightness_label
                                    width: 56
                                    text_font: small_font
                                    text: "0%"
                                    text_color: $text_secondary
                                    text_align: right

                    # ---- Right: Other Rooms Card ----
                    - obj:
                        styles: card_base
                        scrollbar_mode: "off"
                        width: 280
                        height: 396
                        border_width: 0
                        layout:
                          type: flex
                          flex_flow: column
                          pad_row: 12
                        widgets:
                          - label:
                              styles: section_title
                              text: "Other Rooms"

                          - button:
                              id: lr_chandelier_button
                              width: 256
                              flex_grow: 1
                              checkable: true
                              styles: other_rooms_button
                              widgets:
                                - label:
                                    align: center
                                    text_font: label_font
                                    text: "Chandelier"
                              on_click:
                                - homeassistant.service:
                                    service: light.toggle
                                    data:
                                      entity_id: light.dining_room_chandelier

                          - button:
                              id: lr_picture_lights_button
                              width: 256
                              flex_grow: 1
                              checkable: true
                              styles: other_rooms_button
                              widgets:
                                - label:
                                    align: center
                                    text_font: label_font
                                    text: "Picture Lights"
                              on_click:
                                - homeassistant.service:
                                    service: light.toggle
                                    data:
                                      entity_id: light.dining_room_picture_lights

                          - button:
                              id: lr_study_button
                              width: 256
                              flex_grow: 1
                              checkable: true
                              styles: other_rooms_button
                              widgets:
                                - label:
                                    align: center
                                    text_font: label_font
                                    text: "Study"
                              on_click:
                                - homeassistant.service:
                                    service: light.toggle
                                    data:
                                      entity_id: light.study


          # =================================================================
          # TAB 2: CLIMATE (Blinds + Fan + Environment)
          # =================================================================
          - name: "Climate"
            id: climate_tab
            bg_color: $page_bg
            bg_opa: COVER
            pad_all: 10
            layout:
              type: flex
              flex_flow: row
              pad_column: 10
            widgets:

              # ----- Left: Blinds Card -----
              - obj:
                  styles: card_cool
                  scrollbar_mode: "off"
                  width: 320
                  height: 380
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    pad_row: 6
                  widgets:
                    - label:
                        styles: section_title
                        text: "Blinds"
                        align: LEFT_MID

                    # Content: scene buttons + vertical slider
                    - obj:
                        width: 296
                        height: 330
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: row
                          pad_column: 10
                          flex_align_cross: center
                        widgets:

                          # Left: 5 scene preset buttons stacked vertically
                          - obj:
                              width: 200
                              height: 320
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: column
                                pad_row: 6
                                flex_align_main: space_evenly
                              widgets:
                                - button:
                                    id: lr_blind_open_btn
                                    checkable: true
                                    width: 200
                                    height: 56
                                    styles: action_button
                                    checked:
                                      styles: action_button_checked
                                    widgets:
                                      - label:
                                          align: center
                                          text: "Open"
                                    on_click:
                                      - homeassistant.service:
                                          service: scene.turn_on
                                          data:
                                            entity_id: scene.living_room_blinds_open

                                - button:
                                    id: lr_blind_34_btn
                                    checkable: true
                                    width: 200
                                    height: 56
                                    styles: action_button
                                    checked:
                                      styles: action_button_checked
                                    widgets:
                                      - label:
                                          align: center
                                          text: "3/4"
                                    on_click:
                                      - homeassistant.service:
                                          service: scene.turn_on
                                          data:
                                            entity_id: scene.living_room_blinds_3_4_open

                                - button:
                                    id: lr_blind_half_btn
                                    checkable: true
                                    width: 200
                                    height: 56
                                    styles: action_button
                                    checked:
                                      styles: action_button_checked
                                    widgets:
                                      - label:
                                          align: center
                                          text: "1/2"
                                    on_click:
                                      - homeassistant.service:
                                          service: scene.turn_on
                                          data:
                                            entity_id: scene.living_room_blinds_halfway

                                - button:
                                    id: lr_blind_14_btn
                                    checkable: true
                                    width: 200
                                    height: 56
                                    styles: action_button
                                    checked:
                                      styles: action_button_checked
                                    widgets:
                                      - label:
                                          align: center
                                          text: "1/4"
                                    on_click:
                                      - homeassistant.service:
                                          service: scene.turn_on
                                          data:
                                            entity_id: scene.living_room_blinds_1_4_opened

                                - button:
                                    id: lr_blind_closed_btn
                                    checkable: true
                                    width: 200
                                    height: 56
                                    styles: action_button
                                    checked:
                                      styles: action_button_checked
                                    widgets:
                                      - label:
                                          align: center
                                          text: "Closed"
                                    on_click:
                                      - homeassistant.service:
                                          service: scene.turn_on
                                          data:
                                            entity_id: scene.living_room_blinds_closed

                          # Right: Vertical position slider (drag up=open, drag down=close)
                          # Blue fill = openness. Direct mapping to HA cover position.
                          - slider:
                              id: lr_blind_slider
                              width: 40
                              height: 300
                              min_value: 0
                              max_value: 100
                              value: 0
                              mode: NORMAL
                              styles: brightness_slider
                              indicator:
                                styles: brightness_slider_indicator
                              knob:
                                styles: brightness_slider_knob
                              on_release:
                                - homeassistant.service:
                                    service: cover.set_cover_position
                                    data:
                                      entity_id: cover.living_room_blinds
                                      position: !lambda return to_string((int)lv_slider_get_value(id(lr_blind_slider)));

              # ----- Center: Fan Card -----
              - obj:
                  styles: card_cool
                  scrollbar_mode: "off"
                  width: 320
                  height: 380
                  layout:
                    type: flex
                    flex_flow: column
                    flex_align_cross: center
                    pad_row: 6
                  widgets:
                    - label:
                        styles: section_title
                        text: "Ceiling Fan"
                        align: LEFT_MID

                    # Fan Arc
                    - arc:
                        id: lr_fan_arc
                        width: 200
                        height: 200
                        min_value: 0
                        max_value: 100
                        value: 0
                        start_angle: 135
                        end_angle: 45
                        adjustable: true
                        mode: NORMAL
                        indicator:
                          styles: fan_arc_indicator
                        knob:
                          styles: fan_arc_knob
                        on_release:
                          - homeassistant.service:
                              service: fan.set_percentage
                              data:
                                entity_id: fan.living_room_fans
                                percentage: !lambda |-
                                  int val = (int)lv_arc_get_value(id(lr_fan_arc));
                                  if (val < 17) return "0";
                                  if (val < 50) return "33";
                                  if (val < 83) return "66";
                                  return "100";
                        widgets:
                          - label:
                              id: lr_fan_value_label
                              align: center
                              text_font: value_font_medium
                              text: "Off"
                              text_color: $text_primary
                          - label:
                              align: center
                              y: 28
                              text_font: small_font
                              text: "Speed"
                              text_color: $text_secondary

                    # Quick buttons: Off / Low / Med / High
                    - obj:
                        width: 296
                        height: 50
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: row
                          pad_column: 4
                          flex_align_main: space_evenly
                        widgets:
                          - button:
                              id: lr_fan_off_button
                              width: 68
                              height: 44
                              checkable: true
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "Off"
                              on_click:
                                - homeassistant.service:
                                    service: fan.turn_off
                                    data:
                                      entity_id: fan.living_room_fans

                          - button:
                              id: lr_fan_low_button
                              width: 68
                              height: 44
                              checkable: true
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "Low"
                              on_click:
                                - homeassistant.service:
                                    service: fan.set_percentage
                                    data:
                                      entity_id: fan.living_room_fans
                                      percentage: "33"

                          - button:
                              id: lr_fan_med_button
                              width: 68
                              height: 44
                              checkable: true
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "Med"
                              on_click:
                                - homeassistant.service:
                                    service: fan.set_percentage
                                    data:
                                      entity_id: fan.living_room_fans
                                      percentage: "66"

                          - button:
                              id: lr_fan_high_button
                              width: 68
                              height: 44
                              checkable: true
                              styles: action_button
                              widgets:
                                - label:
                                    align: center
                                    text: "High"
                              on_click:
                                - homeassistant.service:
                                    service: fan.set_percentage
                                    data:
                                      entity_id: fan.living_room_fans
                                      percentage: "100"

              # ----- Right: Environment Card -----
              - obj:
                  styles: card_cool
                  scrollbar_mode: "off"
                  width: 330
                  height: 380
                  layout:
                    type: flex
                    flex_flow: column
                    pad_row: 16
                  widgets:
                    - label:
                        styles: section_title
                        text: "Environment"

                    # Indoor Temperature
                    - obj:
                        width: 306
                        height: 90
                        bg_opa: TRANSP
                        border_width: 0
                        pad_all: 0
                        layout:
                          type: flex
                          flex_flow: column
                          pad_row: 4
                        widgets:
                          - obj:
                              width: 306
                              height: 30
                              bg_opa: TRANSP
                              border_width: 0
                              pad_all: 0
                              layout:
                                type: flex
                                flex_flow: row
                                flex_align_main: space_between
                                flex_align_cross: center
                              widgets:
                                - obj:
                                    width: SIZE_CONTENT
                                    height: 24
                                    bg_opa: TRANSP
                                    border_width: 0
                                    pad_all: 0
                                    layout:
                                      type: flex
                                      flex_flow: row
                                      pad_column: 6
                                      flex_align_cross: center
                                    widgets:
                                      - label:
                                          text_font: icon_font_small
                                          text: $thermometer
                                          text_color: $amber
                                      - label:
                                          text_font: label_font
                                          text: "Indoor"
                                          text_color: $text_secondary
                                - label:
                                    id: env_indoor_temp_label
                                    text_font: value_font_medium
                                    text: "--°"
                                    text_color: $text_primary
                          - bar:
                              id: env_indoor_temp_bar
                              width: 306
                              height: 16
                              min_value: -10
                              max_value: 40
