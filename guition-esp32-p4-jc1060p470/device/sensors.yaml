# =============================================================================
# SENSORS — Home Assistant entity bindings for the modern UI
# =============================================================================
# Pulls state from HA entities and syncs LVGL widgets accordingly.
# Organized by: numeric sensors, text sensors, binary sensors.
# =============================================================================


sensor:

  # ===========================================================================
  # HEADER — Temperature & Humidity
  # ===========================================================================

  # Indoor Temperature
  - platform: homeassistant
    entity_id: sensor.living_room_temperature
    id: living_room_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d°"
            args: [ '(int)round(id(outdoor_temperature).state)', '(int)round(x)' ]
      # Climate tab: indoor temp bar + label
      - lvgl.bar.update:
          id: env_indoor_temp_bar
          value: !lambda return (int)round(x);
      - lvgl.label.update:
          id: env_indoor_temp_label
          text:
            format: "%d°"
            args: [ '(int)round(x)' ]

  # Outdoor Temperature (from weather entity)
  - platform: homeassistant
    entity_id: weather.openweathermap
    id: outdoor_temperature
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d°"
            args: [ '(int)round(x)', '(int)round(id(living_room_temperature).state)' ]
      # Climate tab: outdoor temp bar + label
      - lvgl.bar.update:
          id: env_outdoor_temp_bar
          value: !lambda return (int)round(x);
      - lvgl.label.update:
          id: env_outdoor_temp_label
          text:
            format: "%d°"
            args: [ '(int)round(x)' ]

  # Humidity
  - platform: homeassistant
    entity_id: sensor.living_room_sensor_humidity
    id: living_room_humidity
    on_value:
      # Header
      - lvgl.label.update:
          id: humidity_label
          text:
            format: "%d%%"
            args: [ '(int)round(x)' ]
      # Climate tab: humidity bar + label
      - lvgl.bar.update:
          id: env_humidity_bar
          value: !lambda return (int)round(x);
      - lvgl.label.update:
          id: env_humidity_label
          text:
            format: "%d%%"
            args: [ '(int)round(x)' ]

  # ===========================================================================
  # BLINDS & FAN — Position/Speed for arcs
  # ===========================================================================

  # Blind Position → arc + label
  - platform: homeassistant
    entity_id: cover.living_room_blind
    id: lr_blind_position
    attribute: current_position
    on_value:
      - lvgl.arc.update:
          id: lr_blind_arc
          value: !lambda return (int)x;
      - lvgl.label.update:
          id: lr_blind_value_label
          text:
            format: "%d%%"
            args: [ '(int)round(x)' ]

  # Fan Speed Percentage → arc + label
  - platform: homeassistant
    entity_id: fan.living_room_fans
    id: lr_fan_percentage
    attribute: percentage
    on_value:
      - lvgl.arc.update:
          id: lr_fan_arc
          value: !lambda return (int)x;
      - lvgl.label.update:
          id: lr_fan_value_label
          text: !lambda |-
            static char buf[8];
            int val = (int)round(x);
            if (val == 0) return "Off";
            if (val <= 33) return "Low";
            if (val <= 66) return "Med";
            return "High";

  # ===========================================================================
  # LIGHT BRIGHTNESS — Slider feedback (4 lights)
  # ===========================================================================

  # Track Lights brightness
  - platform: homeassistant
    entity_id: light.living_room_track_lights
    id: lr_tracks_brightness
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: lr_tracks_brightness_slider
          value: !lambda return (int)x;
      - lvgl.label.update:
          id: lr_tracks_brightness_label
          text: !lambda |-
            static char buf[8];
            int pct = (int)(x * 100 / 255 + 0.5);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return buf;

  # Floor Lamp brightness
  - platform: homeassistant
    entity_id: light.hue_color_lamp_1_5
    id: lr_floor_brightness
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: lr_floor_brightness_slider
          value: !lambda return (int)x;
      - lvgl.label.update:
          id: lr_floor_brightness_label
          text: !lambda |-
            static char buf[8];
            int pct = (int)(x * 100 / 255 + 0.5);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return buf;

  # Table Lamp brightness
  - platform: homeassistant
    entity_id: light.hue_color_lamp_1_4
    id: lr_table_brightness
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: lr_table_brightness_slider
          value: !lambda return (int)x;
      - lvgl.label.update:
          id: lr_table_brightness_label
          text: !lambda |-
            static char buf[8];
            int pct = (int)(x * 100 / 255 + 0.5);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return buf;

  # Art Deco Lamp brightness
  - platform: homeassistant
    entity_id: light.living_room_art_deco_lamp
    id: lr_deco_brightness
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: lr_deco_brightness_slider
          value: !lambda return (int)x;
      - lvgl.label.update:
          id: lr_deco_brightness_label
          text: !lambda |-
            static char buf[8];
            int pct = (int)(x * 100 / 255 + 0.5);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return buf;

  # ===========================================================================
  # SONOS — Volume level
  # ===========================================================================

  # Volume level (0.0–1.0 from HA, displayed as 0–100%)
  - platform: homeassistant
    entity_id: media_player.living_room_sonos
    id: lr_sonos_volume
    attribute: volume_level
    on_value:
      - lvgl.slider.update:
          id: lr_volume_slider
          value: !lambda return (int)round(x * 100);
      - lvgl.label.update:
          id: lr_volume_label
          text:
            format: "%d%%"
            args: [ '(int)round(x * 100)' ]


# =============================================================================
# TEXT SENSORS — Media info from Sonos
# =============================================================================
text_sensor:

  # Sonos: Track title
  - platform: homeassistant
    entity_id: media_player.living_room_sonos
    id: lr_sonos_media_title
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: lr_sonos_title
          text: !lambda |-
            if (x.empty()) return "No media";
            return x.c_str();

  # Sonos: Artist name
  - platform: homeassistant
    entity_id: media_player.living_room_sonos
    id: lr_sonos_media_artist
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: lr_sonos_artist
          text: !lambda |-
            if (x.empty()) return "--";
            return x.c_str();

  # Sonos: Playback state (playing/paused/idle) → play/pause icon swap
  - platform: homeassistant
    entity_id: media_player.living_room_sonos
    id: lr_sonos_state
    on_value:
      - lvgl.label.update:
          id: lr_play_pause_icon
          text: !lambda |-
            if (x == "playing") return "\U000F03E4";
            return "\U000F040B";


# =============================================================================
# BINARY SENSORS — State sync for toggles, switches, LEDs
# =============================================================================
binary_sensor:

  # ===========================================================================
  # LIGHTS TAB — Toggle button state sync
  # ===========================================================================

  # Track Lights
  - platform: homeassistant
    id: lr_tracks
    entity_id: light.living_room_track_lights
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_tracks_button
            state:
              checked: !lambda return x;

  # Floor Lamp
  - platform: homeassistant
    id: lr_floor_lamp
    entity_id: light.hue_color_lamp_1_5
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_floor_lamp_button
            state:
              checked: !lambda return x;

  # Table Lamp
  - platform: homeassistant
    id: lr_table_lamp
    entity_id: light.hue_color_lamp_1_4
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_table_lamp_button
            state:
              checked: !lambda return x;

  # Art Deco Lamp
  - platform: homeassistant
    id: lr_art_deco
    entity_id: light.living_room_art_deco_lamp
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_art_deco_button
            state:
              checked: !lambda return x;

  # ===========================================================================
  # LIGHTS TAB — Other Rooms toggle state sync
  # ===========================================================================

  # Chandelier
  - platform: homeassistant
    id: lr_chandelier
    entity_id: light.dining_room_chandelier
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_chandelier_button
            state:
              checked: !lambda return x;

  # Picture Lights
  - platform: homeassistant
    id: lr_picture_lights
    entity_id: light.dining_room_picture_lights
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_picture_lights_button
            state:
              checked: !lambda return x;

  # Study
  - platform: homeassistant
    id: lr_study
    entity_id: light.study
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_study_button
            state:
              checked: !lambda return x;

  # ===========================================================================
  # CLIMATE TAB — Fan speed buttons
  # ===========================================================================

  # Fan on/off state → Off button
  - platform: homeassistant
    id: lr_fan_state
    entity_id: fan.living_room_fans
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_fan_off_button
            state:
              checked: !lambda return !x;

  # Fan Low (~33%)
  - platform: template
    id: lr_fan_low
    lambda: |-
      if (id(lr_fan_percentage).has_state() && id(lr_fan_state).state) {
        return abs(id(lr_fan_percentage).state - 33) <= 5;
      }
      return false;
    on_state:
      then:
        lvgl.widget.update:
          id: lr_fan_low_button
          state:
            checked: !lambda return x;

  # Fan Medium (~66%)
  - platform: template
    id: lr_fan_med
    lambda: |-
      if (id(lr_fan_percentage).has_state() && id(lr_fan_state).state) {
        return abs(id(lr_fan_percentage).state - 66) <= 5;
      }
      return false;
    on_state:
      then:
        lvgl.widget.update:
          id: lr_fan_med_button
          state:
            checked: !lambda return x;

  # Fan High (~100%)
  - platform: template
    id: lr_fan_high
    lambda: |-
      if (id(lr_fan_percentage).has_state() && id(lr_fan_state).state) {
        return abs(id(lr_fan_percentage).state - 100) <= 5;
      }
      return false;
    on_state:
      then:
        lvgl.widget.update:
          id: lr_fan_high_button
          state:
            checked: !lambda return x;

  # ===========================================================================
  # MEDIA TAB — Device switch state + LED indicators
  # ===========================================================================

  # TV Power → switch state + LED
  - platform: homeassistant
    id: lr_tv_power
    entity_id: media_player.living_room_tv
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_tv_switch
            state:
              checked: !lambda return x;
        - lvgl.led.update:
            id: lr_tv_led
            brightness: !lambda |-
              return x ? 200 : 0;

  # Apple TV → switch state + LED
  - platform: homeassistant
    id: lr_appletv
    entity_id: remote.living_room_apple_tv
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_appletv_switch
            state:
              checked: !lambda return x;
        - lvgl.led.update:
            id: lr_appletv_led
            brightness: !lambda |-
              return x ? 200 : 0;

  # PS5 Power → switch state + LED
  - platform: homeassistant
    id: lr_ps5
    entity_id: switch.ps5_power
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_ps5_switch
            state:
              checked: !lambda return x;
        - lvgl.led.update:
            id: lr_ps5_led
            brightness: !lambda |-
              return x ? 200 : 0;

  # Sonos Plug → switch state + LED
  - platform: homeassistant
    id: lr_sonos
    entity_id: switch.sonos_living_room_plug
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_sonos_switch
            state:
              checked: !lambda return x;
        - lvgl.led.update:
            id: lr_sonos_led
            brightness: !lambda |-
              return x ? 200 : 0;

  # Sonos Mute State → mute button
  - platform: homeassistant
    id: lr_sonos_muted
    entity_id: media_player.living_room_sonos
    attribute: is_volume_muted
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_mute_button
            state:
              checked: !lambda return x;

  # ===========================================================================
  # STATUS — ESPHome connection status LED
  # ===========================================================================
  - platform: status
    id: esphome_status
    on_state:
      then:
        - lvgl.led.update:
            id: status_led
            brightness: !lambda |-
              return x ? 200 : 0;
