# =============================================================================
# SENSORS — Home Assistant entity bindings for the modern UI
# =============================================================================
# Pulls state from HA entities and syncs LVGL widgets accordingly.
# Organized by: numeric sensors, text sensors, binary sensors.
# =============================================================================


sensor:

  # ===========================================================================
  # HEADER — Temperature & Humidity
  # ===========================================================================

  # Indoor Temperature
  - platform: homeassistant
    entity_id: sensor.living_room_temperature
    id: living_room_temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d°"
            args: [ '(int)round(id(outdoor_temperature).state)', '(int)round(x)' ]
      # Climate tab: indoor temp bar + label
      - lvgl.bar.update:
          id: env_indoor_temp_bar
          value: !lambda return (int)round(x);
      - lvgl.label.update:
          id: env_indoor_temp_label
          text:
            format: "%d°"
            args: [ '(int)round(x)' ]

  # Outdoor Temperature (from weather entity)
  - platform: homeassistant
    entity_id: weather.openweathermap
    id: outdoor_temperature
    attribute: temperature
    on_value:
      - lvgl.label.update:
          id: temperatures
          text:
            format: "%d° / %d°"
            args: [ '(int)round(x)', '(int)round(id(living_room_temperature).state)' ]
      # Climate tab: outdoor temp bar + label
      - lvgl.bar.update:
          id: env_outdoor_temp_bar
          value: !lambda return (int)round(x);
      - lvgl.label.update:
          id: env_outdoor_temp_label
          text:
            format: "%d°"
            args: [ '(int)round(x)' ]

  # Humidity
  - platform: homeassistant
    entity_id: sensor.living_room_sensor_humidity
    id: living_room_humidity
    on_value:
      # Header
      - lvgl.label.update:
          id: humidity_label
          text:
            format: "%d%%"
            args: [ '(int)round(x)' ]
      # Climate tab: humidity bar + label
      - lvgl.bar.update:
          id: env_humidity_bar
          value: !lambda return (int)round(x);
      - lvgl.label.update:
          id: env_humidity_label
          text:
            format: "%d%%"
            args: [ '(int)round(x)' ]

  # ===========================================================================
  # BLINDS & FAN — Position/Speed for arcs
  # ===========================================================================

  # Blind Position → vertical slider (rotated 180°: top=open, bottom=closed)
  # Direct mapping: HA position = slider value, rotation handles visual flip
  - platform: homeassistant
    entity_id: cover.living_room_blinds
    id: lr_blind_position
    attribute: current_position
    on_value:
      - lvgl.slider.update:
          id: lr_blind_slider
          value: !lambda return (int)x;

  # Fan Speed Percentage → arc + label (only when fan is on)
  - platform: homeassistant
    entity_id: fan.living_room_fans
    id: lr_fan_percentage
    attribute: percentage
    on_value:
      - if:
          condition:
            lambda: return id(lr_fan_state).state;
          then:
            - lvgl.arc.update:
                id: lr_fan_arc
                value: !lambda return (int)x;
            - lvgl.label.update:
                id: lr_fan_value_label
                text: !lambda |-
                  static char buf[8];
                  int val = (int)round(x);
                  if (val == 0) return "Off";
                  if (val <= 33) return "Low";
                  if (val <= 66) return "Med";
                  return "High";

  # ===========================================================================
  # LIGHT BRIGHTNESS — Slider feedback (4 lights)
  # ===========================================================================

  # Track Lights brightness
  - platform: homeassistant
    entity_id: light.living_room_track_lights
    id: lr_tracks_brightness
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: lr_tracks_brightness_slider
          value: !lambda |-
            return id(lr_tracks).state ? (int)x : 0;
      - lvgl.label.update:
          id: lr_tracks_brightness_label
          text: !lambda |-
            if (!id(lr_tracks).state) return "0%";
            static char buf[8];
            int pct = (int)(x * 100 / 255 + 0.5);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return buf;

  # Floor Lamp brightness
  - platform: homeassistant
    entity_id: light.hue_color_lamp_1_5
    id: lr_floor_brightness
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: lr_floor_brightness_slider
          value: !lambda |-
            return id(lr_floor_lamp).state ? (int)x : 0;
      - lvgl.label.update:
          id: lr_floor_brightness_label
          text: !lambda |-
            if (!id(lr_floor_lamp).state) return "0%";
            static char buf[8];
            int pct = (int)(x * 100 / 255 + 0.5);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return buf;

  # Table Lamp brightness
  - platform: homeassistant
    entity_id: light.hue_color_lamp_1_4
    id: lr_table_brightness
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: lr_table_brightness_slider
          value: !lambda |-
            return id(lr_table_lamp).state ? (int)x : 0;
      - lvgl.label.update:
          id: lr_table_brightness_label
          text: !lambda |-
            if (!id(lr_table_lamp).state) return "0%";
            static char buf[8];
            int pct = (int)(x * 100 / 255 + 0.5);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return buf;

  # Art Deco Lamp brightness
  - platform: homeassistant
    entity_id: light.living_room_art_deco_lamp
    id: lr_deco_brightness
    attribute: brightness
    on_value:
      - lvgl.slider.update:
          id: lr_deco_brightness_slider
          value: !lambda |-
            return id(lr_art_deco).state ? (int)x : 0;
      - lvgl.label.update:
          id: lr_deco_brightness_label
          text: !lambda |-
            if (!id(lr_art_deco).state) return "0%";
            static char buf[8];
            int pct = (int)(x * 100 / 255 + 0.5);
            if (pct < 0) pct = 0;
            if (pct > 100) pct = 100;
            snprintf(buf, sizeof(buf), "%d%%", pct);
            return buf;

  # ===========================================================================
  # MUSIC TAB — Volume level
  # ===========================================================================

  # Volume level (0.0–1.0 from HA, displayed as 0–100%)
  - platform: homeassistant
    entity_id: media_player.living_room_amp
    id: lr_sonos_volume
    attribute: volume_level
    on_value:
      - lvgl.slider.update:
          id: lr_volume_slider
          value: !lambda return (int)round(x * 100);
      - lvgl.label.update:
          id: lr_volume_label
          text:
            format: "%d%%"
            args: [ '(int)round(x * 100)' ]

  # ===========================================================================
  # MUSIC TAB — EQ: Sub Gain, Bass, Treble
  # ===========================================================================

  # Sub Gain (-15 to +15) → displayed as 0–100%
  - platform: homeassistant
    entity_id: number.living_room_amp_sub_gain
    id: lr_sub_gain
    on_value:
      - lvgl.slider.update:
          id: lr_sub_gain_slider
          value: !lambda return (int)round((x + 15.0) * 100.0 / 30.0);
      - lvgl.label.update:
          id: lr_sub_gain_label
          text:
            format: "%d%%"
            args: [ '(int)round((x + 15.0) * 100.0 / 30.0)' ]

  # Bass (-10 to +10) → displayed as 0–100%
  - platform: homeassistant
    entity_id: number.living_room_amp_bass
    id: lr_bass
    on_value:
      - lvgl.slider.update:
          id: lr_bass_slider
          value: !lambda return (int)round((x + 10.0) * 100.0 / 20.0);
      - lvgl.label.update:
          id: lr_bass_label
          text:
            format: "%d%%"
            args: [ '(int)round((x + 10.0) * 100.0 / 20.0)' ]

  # Treble (-10 to +10) → displayed as 0–100%
  - platform: homeassistant
    entity_id: number.living_room_amp_treble
    id: lr_treble
    on_value:
      - lvgl.slider.update:
          id: lr_treble_slider
          value: !lambda return (int)round((x + 10.0) * 100.0 / 20.0);
      - lvgl.label.update:
          id: lr_treble_label
          text:
            format: "%d%%"
            args: [ '(int)round((x + 10.0) * 100.0 / 20.0)' ]

  # ===========================================================================
  # TV TAB — Arc Volume & EQ
  # ===========================================================================

  # Arc Volume (0.0–1.0 from HA, displayed as 0–100%)
  - platform: homeassistant
    entity_id: media_player.living_room_arc
    id: lr_arc_volume
    attribute: volume_level
    on_value:
      - lvgl.slider.update:
          id: lr_tv_volume_slider
          value: !lambda return (int)round(x * 100);
      - lvgl.label.update:
          id: lr_tv_volume_label
          text:
            format: "%d%%"
            args: [ '(int)round(x * 100)' ]

  # Arc Bass (-10 to +10) → displayed as 0–100%
  - platform: homeassistant
    entity_id: number.living_room_arc_bass
    id: lr_arc_bass
    on_value:
      - lvgl.slider.update:
          id: lr_tv_bass_slider
          value: !lambda return (int)round((x + 10.0) * 100.0 / 20.0);
      - lvgl.label.update:
          id: lr_tv_bass_label
          text:
            format: "%d%%"
            args: [ '(int)round((x + 10.0) * 100.0 / 20.0)' ]

  # Arc Treble (-10 to +10) → displayed as 0–100%
  - platform: homeassistant
    entity_id: number.living_room_arc_treble
    id: lr_arc_treble
    on_value:
      - lvgl.slider.update:
          id: lr_tv_treble_slider
          value: !lambda return (int)round((x + 10.0) * 100.0 / 20.0);
      - lvgl.label.update:
          id: lr_tv_treble_label
          text:
            format: "%d%%"
            args: [ '(int)round((x + 10.0) * 100.0 / 20.0)' ]

  # Arc Sub Gain (-15 to +15) → displayed as 0–100%
  - platform: homeassistant
    entity_id: number.living_room_arc_sub_gain
    id: lr_arc_sub_gain
    on_value:
      - lvgl.slider.update:
          id: lr_tv_sub_slider
          value: !lambda return (int)round((x + 15.0) * 100.0 / 30.0);
      - lvgl.label.update:
          id: lr_tv_sub_label
          text:
            format: "%d%%"
            args: [ '(int)round((x + 15.0) * 100.0 / 30.0)' ]



# =============================================================================
# TEXT SENSORS — Media info from Amp
# =============================================================================
text_sensor:

  # Amp: Track title
  - platform: homeassistant
    entity_id: media_player.living_room_amp
    id: lr_sonos_media_title
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: lr_sonos_title
          text: !lambda |-
            if (x.empty()) return "No media";
            return x.c_str();

  # Amp: Artist name
  - platform: homeassistant
    entity_id: media_player.living_room_amp
    id: lr_sonos_media_artist
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: lr_sonos_artist
          text: !lambda |-
            if (x.empty()) return "--";
            return x.c_str();

  # Amp: Playback state (playing/paused/idle) → play/pause icon swap + screen wake
  - platform: homeassistant
    entity_id: media_player.living_room_amp
    id: lr_sonos_state
    on_value:
      - lvgl.label.update:
          id: lr_play_pause_icon
          text: !lambda |-
            if (x == "playing") return "\U000F03E4";
            return "\U000F040B";
      - script.execute: evaluate_screen

  # Amp: Media source (Apple Music, TV, Line In, etc.)
  - platform: homeassistant
    entity_id: media_player.living_room_amp
    id: lr_sonos_media_source
    attribute: source
    on_value:
      - lvgl.label.update:
          id: lr_sonos_source
          text: !lambda |-
            if (x.empty()) return "";
            return x.c_str();

  # Apple TV: Track title
  - platform: homeassistant
    entity_id: media_player.living_room_apple_tv
    id: lr_atv_media_title
    attribute: media_title
    on_value:
      - lvgl.label.update:
          id: lr_tv_title
          text: !lambda |-
            if (x.empty()) return "No media";
            return x.c_str();

  # Apple TV: Artist name
  - platform: homeassistant
    entity_id: media_player.living_room_apple_tv
    id: lr_atv_media_artist
    attribute: media_artist
    on_value:
      - lvgl.label.update:
          id: lr_tv_artist
          text: !lambda |-
            if (x.empty()) return "--";
            return x.c_str();

  # Apple TV: Playback state → play/pause icon swap
  - platform: homeassistant
    entity_id: media_player.living_room_apple_tv
    id: lr_atv_state
    on_value:
      - lvgl.label.update:
          id: lr_tv_play_pause_icon
          text: !lambda |-
            if (x == "playing") return "\U000F03E4";
            return "\U000F040B";

  # Sync Box: HDMI Input → source button checked state
  - platform: homeassistant
    entity_id: select.sync_box_1_hdmi_input
    id: lr_sync_hdmi_input
    on_value:
      - lvgl.widget.update:
          id: lr_tv_src_atv_btn
          state:
            checked: !lambda return x == "Apple TV";
      - lvgl.widget.update:
          id: lr_tv_src_ps5_btn
          state:
            checked: !lambda return x == "PS5";
      - lvgl.widget.update:
          id: lr_tv_src_sw2_btn
          state:
            checked: !lambda return x == "Switch 2";

  # Sync Box: Sync Mode → mode button checked state
  - platform: homeassistant
    entity_id: select.sync_box_1_sync_mode
    id: lr_sync_mode
    on_value:
      - lvgl.widget.update:
          id: lr_tv_sync_video_btn
          state:
            checked: !lambda return x == "video";
      - lvgl.widget.update:
          id: lr_tv_sync_music_btn
          state:
            checked: !lambda return x == "music";
      - lvgl.widget.update:
          id: lr_tv_sync_game_btn
          state:
            checked: !lambda return x == "game";


# =============================================================================
# BINARY SENSORS — State sync for toggles, switches, LEDs
# =============================================================================
binary_sensor:

  # ===========================================================================
  # LIGHTS TAB — Toggle button state sync
  # ===========================================================================

  # Track Lights
  - platform: homeassistant
    id: lr_tracks
    entity_id: light.living_room_track_lights
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_tracks_button
            state:
              checked: !lambda return x;
        - lvgl.slider.update:
            id: lr_tracks_brightness_slider
            value: !lambda |-
              if (!x) return 0;
              return id(lr_tracks_brightness).has_state() ? (int)id(lr_tracks_brightness).state : 0;
        - lvgl.label.update:
            id: lr_tracks_brightness_label
            text: !lambda |-
              if (!x) return "0%";
              if (!id(lr_tracks_brightness).has_state()) return "0%";
              static char buf[8];
              int pct = (int)(id(lr_tracks_brightness).state * 100 / 255 + 0.5);
              if (pct < 0) pct = 0;
              if (pct > 100) pct = 100;
              snprintf(buf, sizeof(buf), "%d%%", pct);
              return buf;
        - lambda: |-
            lv_obj_set_style_bg_color(id(lr_tracks_brightness_slider), lv_color_hex(x ? 0xFFFFFF : 0x555555), LV_PART_KNOB);

  # Floor Lamp
  - platform: homeassistant
    id: lr_floor_lamp
    entity_id: light.hue_color_lamp_1_5
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_floor_lamp_button
            state:
              checked: !lambda return x;
        - lvgl.slider.update:
            id: lr_floor_brightness_slider
            value: !lambda |-
              if (!x) return 0;
              return id(lr_floor_brightness).has_state() ? (int)id(lr_floor_brightness).state : 0;
        - lvgl.label.update:
            id: lr_floor_brightness_label
            text: !lambda |-
              if (!x) return "0%";
              if (!id(lr_floor_brightness).has_state()) return "0%";
              static char buf[8];
              int pct = (int)(id(lr_floor_brightness).state * 100 / 255 + 0.5);
              if (pct < 0) pct = 0;
              if (pct > 100) pct = 100;
              snprintf(buf, sizeof(buf), "%d%%", pct);
              return buf;
        - lambda: |-
            lv_obj_set_style_bg_color(id(lr_floor_brightness_slider), lv_color_hex(x ? 0xFFFFFF : 0x555555), LV_PART_KNOB);

  # Table Lamp
  - platform: homeassistant
    id: lr_table_lamp
    entity_id: light.hue_color_lamp_1_4
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_table_lamp_button
            state:
              checked: !lambda return x;
        - lvgl.slider.update:
            id: lr_table_brightness_slider
            value: !lambda |-
              if (!x) return 0;
              return id(lr_table_brightness).has_state() ? (int)id(lr_table_brightness).state : 0;
        - lvgl.label.update:
            id: lr_table_brightness_label
            text: !lambda |-
              if (!x) return "0%";
              if (!id(lr_table_brightness).has_state()) return "0%";
              static char buf[8];
              int pct = (int)(id(lr_table_brightness).state * 100 / 255 + 0.5);
              if (pct < 0) pct = 0;
              if (pct > 100) pct = 100;
              snprintf(buf, sizeof(buf), "%d%%", pct);
              return buf;
        - lambda: |-
            lv_obj_set_style_bg_color(id(lr_table_brightness_slider), lv_color_hex(x ? 0xFFFFFF : 0x555555), LV_PART_KNOB);

  # Art Deco Lamp
  - platform: homeassistant
    id: lr_art_deco
    entity_id: light.living_room_art_deco_lamp
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_art_deco_button
            state:
              checked: !lambda return x;
        - lvgl.slider.update:
            id: lr_deco_brightness_slider
            value: !lambda |-
              if (!x) return 0;
              return id(lr_deco_brightness).has_state() ? (int)id(lr_deco_brightness).state : 0;
        - lvgl.label.update:
            id: lr_deco_brightness_label
            text: !lambda |-
              if (!x) return "0%";
              if (!id(lr_deco_brightness).has_state()) return "0%";
              static char buf[8];
              int pct = (int)(id(lr_deco_brightness).state * 100 / 255 + 0.5);
              if (pct < 0) pct = 0;
              if (pct > 100) pct = 100;
              snprintf(buf, sizeof(buf), "%d%%", pct);
              return buf;
        - lambda: |-
            lv_obj_set_style_bg_color(id(lr_deco_brightness_slider), lv_color_hex(x ? 0xFFFFFF : 0x555555), LV_PART_KNOB);

  # ===========================================================================
  # LIGHTS TAB — Other Rooms toggle state sync
  # ===========================================================================

  # Chandelier
  - platform: homeassistant
    id: lr_chandelier
    entity_id: light.dining_room_chandelier
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_chandelier_button
            state:
              checked: !lambda return x;

  # Picture Lights
  - platform: homeassistant
    id: lr_picture_lights
    entity_id: light.dining_room_picture_lights
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_picture_lights_button
            state:
              checked: !lambda return x;

  # Study
  - platform: homeassistant
    id: lr_study
    entity_id: light.study
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_study_button
            state:
              checked: !lambda return x;

  # ===========================================================================
  # CLIMATE TAB — Blind scene buttons
  # ===========================================================================

  - platform: homeassistant
    entity_id: switch.living_room_blind_open_stateful_scene
    id: lr_blind_open_state
    on_state:
      - lvgl.widget.update:
          id: lr_blind_open_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    entity_id: switch.living_room_blind_3_4_open_stateful_scene
    id: lr_blind_34_state
    on_state:
      - lvgl.widget.update:
          id: lr_blind_34_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    entity_id: switch.living_room_blind_halfway_stateful_scene
    id: lr_blind_half_state
    on_state:
      - lvgl.widget.update:
          id: lr_blind_half_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    entity_id: switch.living_room_blind_1_4_opened_stateful_scene
    id: lr_blind_14_state
    on_state:
      - lvgl.widget.update:
          id: lr_blind_14_btn
          state:
            checked: !lambda return x;

  - platform: homeassistant
    entity_id: switch.living_room_blind_closed_stateful_scene
    id: lr_blind_closed_state
    on_state:
      - lvgl.widget.update:
          id: lr_blind_closed_btn
          state:
            checked: !lambda return x;

  # ===========================================================================
  # CLIMATE TAB — Fan speed buttons
  # ===========================================================================

  # Fan on/off state → Off button + reset arc/label when off
  - platform: homeassistant
    id: lr_fan_state
    entity_id: fan.living_room_fans
    trigger_on_initial_state: true
    on_state:
      then:
        - lvgl.widget.update:
            id: lr_fan_off_button
            state:
              checked: !lambda return !x;
        - if:
            condition:
              lambda: return !x;
            then:
              - lvgl.arc.update:
                  id: lr_fan_arc
                  value: 0
              - lvgl.label.update:
                  id: lr_fan_value_label
                  text: "Off"

  # Fan Low (~33%)
  - platform: template
    id: lr_fan_low
    lambda: |-
      if (id(lr_fan_percentage).has_state() && id(lr_fan_state).state) {
        return abs(id(lr_fan_percentage).state - 33) <= 5;
      }
      return false;
    on_state:
      then:
        lvgl.widget.update:
          id: lr_fan_low_button
          state:
            checked: !lambda return x;

  # Fan Medium (~66%)
  - platform: template
    id: lr_fan_med
    lambda: |-
      if (id(lr_fan_percentage).has_state() && id(lr_fan_state).state) {
        return abs(id(lr_fan_percentage).state - 66) <= 5;
      }
      return false;
    on_state:
      then:
        lvgl.widget.update:
          id: lr_fan_med_button
          state:
            checked: !lambda return x;

  # Fan High (~100%)
  - platform: template
    id: lr_fan_high
    lambda: |-
      if (id(lr_fan_percentage).has_state() && id(lr_fan_state).state) {
        return abs(id(lr_fan_percentage).state - 100) <= 5;
      }
      return false;
    on_state:
      then:
        lvgl.widget.update:
          id: lr_fan_high_button
          state:
            checked: !lambda return x;

