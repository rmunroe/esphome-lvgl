# =============================================================================
# BACKLIGHT — Presence & activity-based screen control
# =============================================================================
# Screen turns on when ANY of the following are true:
#   - Room is occupied (binary_sensor.living_room_occupancy)
#   - Apple TV is active (remote.living_room_apple_tv)
#   - PS5 is powered on (switch.ps5_power)
#   - Sonos is playing (media_player.living_room_sonos)
# Screen turns off when NONE of the above are true.
#
# Each source sensor calls the evaluate_screen script, which publishes
# the combined state to the screen_active template binary sensor.
# =============================================================================

switch:
  - platform: template
    id: backlight
    restore_mode: ALWAYS_ON
    internal: true
    turn_on_action:
      - light.turn_on:
          id: display_backlight
          transition_length: 1s
    turn_off_action:
      - light.turn_off:
          id: display_backlight
          transition_length: 2s

script:
  - id: evaluate_screen
    mode: restart
    then:
      - binary_sensor.template.publish:
          id: screen_active
          state: !lambda |-
            return id(presence).state ||
                   id(lr_appletv).state ||
                   id(lr_ps5).state ||
                   (id(lr_sonos_state).has_state() && id(lr_sonos_state).state == "playing");

binary_sensor:
  # Occupancy from HA
  - platform: homeassistant
    id: presence
    entity_id: binary_sensor.living_room_occupancy
    internal: true
    on_state:
      - script.execute: evaluate_screen

  # Combined activity sensor — state published by evaluate_screen script
  - platform: template
    id: screen_active
    internal: true
    on_press:
      - lvgl.resume:
      - delay: 10ms
      - switch.turn_on: backlight
      - logger.log: "Screen on — presence or media activity detected"
    on_release:
      - switch.turn_off: backlight
      - lvgl.pause:
          show_snow: true
      - logger.log: "Screen off — no presence or media activity"
