# =============================================================================
# BACKLIGHT — Presence & activity-based screen control
# =============================================================================
# Screen turns on when ANY of the following are true:
#   - Room is occupied (binary_sensor.living_room_occupancy)
#   - Apple TV is active (remote.living_room_apple_tv)
#   - PS5 is powered on (switch.ps5_power)
#   - Sonos is playing (media_player.living_room_sonos)
#   - Screen is touched while off (touch-to-wake, stays on 2 min)
# Screen turns off when NONE of the above are true.
#
# Each source sensor calls the evaluate_screen script, which publishes
# the combined state to the screen_active template binary sensor.
# Touch-to-wake starts a 2-minute timer; further touches reset it.
# =============================================================================

globals:
  - id: touch_wake_active
    type: bool
    initial_value: "false"

switch:
  - platform: template
    id: backlight
    restore_mode: ALWAYS_ON
    internal: true
    turn_on_action:
      - light.turn_on:
          id: display_backlight
          transition_length: 1s
    turn_off_action:
      - light.turn_off:
          id: display_backlight
          transition_length: 2s

script:
  - id: evaluate_screen
    mode: restart
    then:
      - binary_sensor.template.publish:
          id: screen_active
          state: !lambda |-
            return id(touch_wake_active) ||
                   id(presence).state ||
                   id(lr_appletv).state ||
                   id(lr_ps5).state ||
                   (id(lr_sonos_state).has_state() && id(lr_sonos_state).state == "playing");

  - id: touch_wake_timeout
    mode: restart
    then:
      - lambda: id(touch_wake_active) = true;
      - script.execute: evaluate_screen
      - delay: 2min
      - lambda: id(touch_wake_active) = false;
      - script.execute: evaluate_screen
      - logger.log: "Touch-wake timeout expired"

binary_sensor:
  # Occupancy from HA
  - platform: homeassistant
    id: presence
    entity_id: binary_sensor.living_room_occupancy
    internal: true
    on_state:
      - script.execute: evaluate_screen

  # Touch-to-wake — tapping the screen wakes it and resets the timeout
  - platform: touchscreen
    touchscreen_id: my_touchscreen
    id: touch_wake
    internal: true
    x_min: 0
    x_max: 1024
    y_min: 0
    y_max: 600
    on_press:
      - if:
          condition:
            lambda: return !id(screen_active).state;
          then:
            - script.execute: touch_wake_timeout
            - logger.log: "Screen woken by touch — 2 min timeout started"
      - if:
          condition:
            lambda: return id(touch_wake_active);
          then:
            - script.execute: touch_wake_timeout
            - logger.log: "Touch-wake timeout reset"

  # Combined activity sensor — state published by evaluate_screen script
  - platform: template
    id: screen_active
    internal: true
    on_press:
      - lvgl.resume:
      - delay: 10ms
      - switch.turn_on: backlight
      - logger.log: "Screen on — presence or media activity detected"
    on_release:
      - switch.turn_off: backlight
      - lvgl.pause:
      - logger.log: "Screen off — no presence or media activity"
