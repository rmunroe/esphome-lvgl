# =============================================================================
# SCREENSHOT — Remote display capture via HTTP
# =============================================================================
# Adds a /screenshot endpoint that serves a live BMP image of the display.
# Access via browser: http://<device-ip>/screenshot
# Access via CLI:     curl -o screenshot.bmp http://<device-ip>/screenshot
# JSON info:          http://<device-ip>/screenshot/info
# =============================================================================

web_server:
  port: 80

external_components:
  - source:
      type: git
      url: https://github.com/rmunroe/esphome-lvgl
      ref: main
    refresh: 1s
    components: [display_capture]

display_capture:
  display_id: my_display
