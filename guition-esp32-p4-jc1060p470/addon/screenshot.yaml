# =============================================================================
# SCREENSHOT — Remote display capture via HTTP
# =============================================================================
# Serves a live JPEG screenshot of the LVGL display over HTTP.
# Uses LVGL's own draw buffer — compatible with MIPI DSI and all backends.
#
# Access via browser: http://<device-ip>:8080/screenshot
# Access via CLI:     curl -o screenshot.jpg http://<device-ip>:8080/screenshot
# =============================================================================

lvgl_screenshot:
  port: 8080
